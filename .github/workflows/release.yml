#
# Orion fork release: on a tag, build the portable (OS-independent) shared jar
# plus a sources jar, a consumable POM, and SHA-256 checksums, then publish a
# GitHub Release named exactly like the tag. The heavy CEF runtime is
# intentionally NOT bundled here; it is downloaded per-OS at runtime
# (jcefmaven-style), so the same jar runs on any OS.

name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 146.0.0). Ignored when run from a tag.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build:
    name: Build portable artifacts
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs['artifact-id'] }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve version (single source of truth = git tag)
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Compile Java + run unit tests
        run: |
          set -euo pipefail
          chmod +x tools/compile.sh tools/make_jar.sh
          tools/compile.sh linux64
          JUNIT="third_party/junit/junit-platform-console-standalone-1.4.2.jar"
          JOGL=$(printf '%s:' third_party/jogamp/jar/*.jar)
          CP="${JUNIT}:out/linux64:${JOGL}"
          java -cp "$CP" org.junit.platform.console.ConsoleLauncher \
            -cp "$CP" --disable-ansi-colors --fail-if-no-tests \
            --select-class tests.junittests.CefMainThreadTest \
            --select-class tests.junittests.CefInitializationModeTest

      - name: Assemble portable jar, sources jar, POM, checksums
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          chmod +x scripts/package-portable.sh
          scripts/package-portable.sh "${VERSION}" dist

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: portable-${{ steps.ver.outputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: portable-${{ needs.build.outputs.version }}
          path: dist

      - name: Verify checksums before publishing
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS.txt
          echo "All checksums verified."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/jcef-orion-${{ needs.build.outputs.version }}.jar
            dist/jcef-orion-${{ needs.build.outputs.version }}-sources.jar
            dist/jcef-orion-${{ needs.build.outputs.version }}.pom
            dist/SHA256SUMS.txt

      - name: Delete temporary Actions artifact
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ needs.build.outputs.artifact_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --method DELETE "repos/${REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"

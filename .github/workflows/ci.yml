#
# Orion fork CI: compiles the (OS-independent) Java side, runs the pure-Java
# unit tests, and builds the portable jcef.jar. No native build / CEF download
# is needed here because the fork changes are Java-only and the jar runs on any
# OS (the CEF runtime is downloaded per-OS at runtime, jcefmaven-style).

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  java:
    name: Compile Java, run unit tests, build portable jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile Java (OS-independent classes)
        run: |
          chmod +x tools/compile.sh
          tools/compile.sh linux64

      - name: Run pure-Java unit tests
        run: |
          JUNIT="third_party/junit/junit-platform-console-standalone-1.4.2.jar"
          JOGL=$(printf '%s:' third_party/jogamp/jar/*.jar)
          CP="${JUNIT}:out/linux64:${JOGL}"
          java -cp "$CP" org.junit.platform.console.ConsoleLauncher \
            -cp "$CP" --disable-ansi-colors --fail-if-no-tests \
            --select-class tests.junittests.CefMainThreadTest \
            --select-class tests.junittests.CefInitializationModeTest

      - name: Build portable jcef.jar
        run: |
          chmod +x tools/make_jar.sh
          tools/make_jar.sh linux64
          echo "--- produced jars ---"
          ls -la out/linux64/*.jar

      - name: Upload portable jar
        uses: actions/upload-artifact@v4
        with:
          name: jcef-orion-jar
          path: out/linux64/jcef.jar
          if-no-files-found: error
          retention-days: 14

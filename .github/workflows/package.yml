#
# Orion fork packaging (manual): build the portable distribution artifacts and
# upload them as a workflow artifact, without creating a GitHub Release. Handy
# for validating packaging on demand. Releases are created by release.yml on
# v* tags.

name: Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifacts (e.g. 146.0.0-rc1).'
        required: true
        default: '0.0.0-manual'

permissions:
  contents: read

jobs:
  package:
    name: Build portable distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile Java
        run: |
          chmod +x tools/compile.sh
          tools/compile.sh linux64

      - name: Package portable artifacts
        run: |
          chmod +x scripts/package-portable.sh
          scripts/package-portable.sh "${{ github.event.inputs.version }}" dist

      - name: Validate distribution
        run: |
          chmod +x scripts/validate-package.sh
          scripts/validate-package.sh "${{ github.event.inputs.version }}" dist

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: jcef-orion-dist-${{ github.event.inputs.version }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

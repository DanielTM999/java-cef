name: Native Binaries

env:
  JCEF_ORION_VERSION: '1.0.0'

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create/update (for example native-v1.0.0).'
        required: true
        default: 'native-v1.0.0'
      commit_binaries:
        description: 'Commit generated binaries into vendor/jcef on the selected branch.'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    tags:
      - 'native-v*'

permissions:
  contents: read

jobs:
  build-java-jar:
    name: Build portable Java jar
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs['artifact-id'] }}
      release_tag: ${{ steps.ver.outputs.release_tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Resolve release tag and artifact version
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          else
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          fi

          VERSION="${JCEF_ORION_VERSION}"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Version: ${VERSION}"

      - name: Compile Java classes
        run: |
          set -euo pipefail
          chmod +x tools/compile.sh
          tools/compile.sh linux64

      - name: Package portable jar
        run: |
          set -euo pipefail
          chmod +x scripts/package-portable.sh scripts/validate-package.sh
          scripts/package-portable.sh "${{ steps.ver.outputs.version }}" dist
          scripts/validate-package.sh "${{ steps.ver.outputs.version }}" dist

      - name: Upload portable jar assets
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: jcef-orion-portable
          path: dist/
          if-no-files-found: error
          retention-days: 1

  build-native:
    name: Build native ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win64
            cef_arch: x64
          - os: ubuntu-latest
            platform: linux64
          - os: macos-15-intel
            platform: macosx64
            project_arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential ninja-build libgtk-3-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install ninja ant

      - name: Configure native build (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B jcef_build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure native build (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B jcef_build -G Ninja -DPROJECT_ARCH=${{ matrix.project_arch }} -DCMAKE_BUILD_TYPE=Release

      - name: Configure native build (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B jcef_build -G "Visual Studio 17 2022" -A ${{ matrix.cef_arch }}

      - name: Build native targets
        run: cmake --build jcef_build --config Release --parallel

      - name: Compile Java classes (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          chmod +x tools/compile.sh
          tools/compile.sh linux64

      - name: Compile Java classes (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd tools
          call compile.bat win64

      - name: Build redistributable (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          chmod +x tools/make_distrib.sh
          tools/make_distrib.sh linux64

      - name: Build redistributable (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          chmod +x tools/make_distrib.sh
          tools/make_distrib.sh macosx64

      - name: Build redistributable (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd tools
          call make_distrib.bat win64

      - name: Archive redistributable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-archives
          tar -czf "dist-archives/jcef-distrib-${{ matrix.platform }}.tar.gz" "binary_distrib/${{ matrix.platform }}"
          ls -lh dist-archives

      - name: Upload redistributable archive
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: jcef-distrib-${{ matrix.platform }}
          path: dist-archives/jcef-distrib-${{ matrix.platform }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish release
    needs:
      - build-java-jar
      - build-native
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - name: Download temporary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f -print | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-java-jar.outputs.release_tag }}
          name: ${{ needs.build-java-jar.outputs.release_tag }}
          fail_on_unmatched_files: true
          files: release-assets/**/*

  commit-binaries:
    name: Commit generated binaries
    needs:
      - build-java-jar
      - build-native
    if: github.event_name == 'workflow_dispatch' && github.ref_type == 'branch' && github.event.inputs.commit_binaries == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          lfs: true

      - name: Download temporary artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-assets

      - name: Merge generated binaries into vendor/jcef
        run: |
          set -euo pipefail
          git lfs install --local

          rm -rf vendor/jcef
          mkdir -p vendor/jcef/java

          cp downloaded-assets/jcef-orion-portable/* vendor/jcef/java/

          for archive in downloaded-assets/jcef-distrib-*/*.tar.gz; do
            name="$(basename "$archive" .tar.gz)"
            platform="${name#jcef-distrib-}"
            mkdir -p "vendor/jcef/${platform}"
            tar -xzf "$archive" -C "vendor/jcef/${platform}" --strip-components=2
          done

          find vendor/jcef -maxdepth 3 -type f | sort | sed -n '1,160p'

      - name: Commit generated binaries back to repository
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes vendor/jcef/

          if git diff --staged --quiet; then
            echo "No generated binary changes to commit."
          else
            git commit -m "ci: update generated JCEF binaries [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

  cleanup-actions-artifacts:
    name: Delete temporary Actions artifacts
    needs:
      - build-java-jar
      - build-native
      - release
      - commit-binaries
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete temporary Actions artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          artifacts="$(gh api "repos/${REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --paginate --jq '.artifacts[].id')"
          if [[ -z "${artifacts}" ]]; then
            echo "No temporary artifacts found."
            exit 0
          fi

          for artifact_id in ${artifacts}; do
            echo "Deleting artifact ${artifact_id}"
            gh api --method DELETE "repos/${REPOSITORY}/actions/artifacts/${artifact_id}"
          done
